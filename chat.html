<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — Grok Playground AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="chat-layout">
        <!-- Sidebar -->
        <aside class="chat-sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="btn btn-new-chat" onclick="newChat()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
            </div>
            <div class="sidebar-content" id="chatHistory">
                <!-- History items will be injected here -->
                <div class="history-group">Yesterday</div>
                <div class="history-item active">Futuristic Cityscape...</div>
            </div>
            <div class="sidebar-footer">
                <div class="user-profile" id="userProfile" style="display:none;">
                    <img src="" alt="User" id="sidebarUserPhoto">
                    <div class="user-info">
                        <span class="user-name" id="sidebarUserName">User</span>
                        <span class="user-credits"><span id="sidebarCredits">0</span> Credits</span>
                    </div>
                </div>
                <button class="btn btn-ghost btn-block" onclick="location.href='/'">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    </svg>
                    Original Interface
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <button class="mobile-toggle" onclick="toggleSidebar()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="chat-title">Grok Imagine Chat</div>
                <div class="header-actions">
                    <div class="credits-pill" onclick="openBuyModal()">
                        <span id="headerCredits">0</span> Credits
                    </div>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <h1>What can I create for you today?</h1>
                    <div class="suggestion-grid">
                        <button class="suggestion" onclick="usePrompt('A cozy cabin in the woods at night with aurora borealis')">
                            <span>"A cozy cabin in the woods..."</span>
                            <small>Image Generation</small>
                        </button>
                        <button class="suggestion" onclick="usePrompt('A slow motion wave crashing on a golden beach')">
                            <span>"A slow motion wave..."</span>
                            <small>Video Generation</small>
                        </button>
                        <button class="suggestion" onclick="usePrompt('Synthwave music with heavy bass and retro vibes')">
                            <span>"Synthwave music..."</span>
                            <small>Audio Generation</small>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Chat Input Controls -->
            <div class="chat-input-wrapper">
                <div class="chat-controls" id="chatControls">
                    <div class="control-group">
                        <label>Mode</label>
                        <select id="chatMode" onchange="onModeChange()">
                            <option value="text_to_image" selected>🖼️ Image Gen</option>
                            <option value="image_edit">✏️ Image Edit</option>
                            <option value="image_to_video">🎬 Image to Video</option>
                            <option value="text_to_video">🎥 Text to Video</option>
                            <option value="text_to_audio">🎵 Text to Audio</option>
                        </select>
                    </div>
                    <div class="control-group" id="ctrl-aspect">
                        <label>Ratio</label>
                        <select id="chatAspect" onchange="updateCalculatedCost()">
                            <option value="1:1">1:1</option>
                            <option value="16:9">16:9</option>
                            <option value="9:16">9:16</option>
                            <option value="4:3">4:3</option>
                            <option value="3:4">3:4</option>
                            <option value="3:2">3:2</option>
                            <option value="2:3">2:3</option>
                            <option value="auto">Auto</option>
                        </select>
                    </div>
                    <div class="control-group" id="ctrl-resolution">
                        <label>Res</label>
                        <select id="chatResolution" onchange="updateCalculatedCost()">
                            <option value="1k" selected>1k</option>
                            <option value="2k">2k</option>
                            <option value="480p">480p</option>
                            <option value="720p">720p</option>
                        </select>
                    </div>
                    <div class="control-group" id="ctrl-duration">
                        <label>Dur</label>
                        <select id="chatDuration" onchange="updateCalculatedCost()">
                            <option value="5">5s</option>
                            <option value="10">10s</option>
                            <option value="15">15s</option>
                        </select>
                    </div>
                    <div class="control-group" id="ctrl-model">
                        <label>Model</label>
                        <select id="chatModel" onchange="updateCalculatedCost()">
                            <option value="grok-imagine-image" selected>Standard</option>
                            <option value="grok-imagine-image-pro">Pro</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <div class="chat-cost-badge">
                            <span id="chatCost">...</span> <span>cr</span>
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="attachment-preview" id="attachmentPreview" style="display:none;">
                        <img src="" id="previewImg">
                        <button class="remove-attachment" onclick="clearAttachment()">&times;</button>
                    </div>
                    <div class="input-container">
                        <button class="btn-attach" onclick="document.getElementById('chatFile').click()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                            </svg>
                        </button>
                        <textarea id="chatInput" placeholder="Message Grok..." rows="1" oninput="autoExpand(this)"></textarea>
                        <button class="btn-send" id="sendBtn" onclick="sendChat()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <input type="file" id="chatFile" style="display:none;" onchange="handleChatFile(event)">
                </div>
                <div class="input-info">Grok can make mistakes. Check important info.</div>
            </div>
        </main>
    </div>

    <!-- Reusing Modals from index.html -->
    <div id="authModal" class="modal">...</div>
    <div id="buyModal" class="modal">...</div>

    <!-- Firebase & App Logic -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
